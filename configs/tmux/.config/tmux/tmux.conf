# Terminal settings
set -g default-terminal "tmux-256color"
set -g extended-keys on
set -g extended-keys-format csi-u
set -ag terminal-overrides ",xterm-256color:RGB"

# Set leader to alt j
unbind C-b
set -g prefix m-j
bind m-j send-prefix

# Number windows and panes from 1
set -g base-index 1
set -g pane-base-index 1

# | to split horizontal
unbind %
bind | split-window -h -c "#{pane_current_path}"

# - to split vertical
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Catppuccin Latte colors
thm_base="#eff1f5"
thm_surface0="#ccd0da"
thm_overlay0="#9ca0b0"
thm_text="#4c4f69"
thm_blue="#1e66f5"
thm_lavender="#7287fd"

# Status bar
set -g status-position top
set -g status-style "fg=${thm_text}"
set -g status-left ""
set -g status-right ""

# Terminal title
set -g set-titles on
set -g set-titles-string "tmux #S"

# Window status
set -g window-status-format "#[fg=${thm_overlay0}] #I:#W "
set -g window-status-current-format "#[fg=${thm_base},bg=${thm_blue}] #I:#W "

# Pane border
set -g pane-border-style "fg=${thm_surface0}"
set -g pane-active-border-style "fg=${thm_lavender}"

# Message style
set -g message-style "fg=${thm_text}"
